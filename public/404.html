<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Derma-T</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — redirects deep links back to
      // index.html so React Router can handle them.
      // pathSegmentsToKeep = 1 keeps the "/derma-t-website" repo segment.
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
